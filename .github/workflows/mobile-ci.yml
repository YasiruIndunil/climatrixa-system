name: Mobile CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'smart-env-mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'smart-env-mobile/**'
      - '.github/workflows/mobile-ci.yml'

defaults:
  run:
    working-directory: smart-env-mobile

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if Flutter project exists yet
        id: check
        run: |
          if [ -f "pubspec.yaml" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No pubspec.yaml found yet - skipping build (placeholder component)."
          fi

      - name: Set up Flutter
        if: steps.check.outputs.exists == 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        run: flutter pub get

      - name: Run analyzer
        if: steps.check.outputs.exists == 'true'
        run: flutter analyze

      - name: Run tests
        if: steps.check.outputs.exists == 'true'
        run: flutter test

      - name: Build APK (debug)
        if: steps.check.outputs.exists == 'true'
        run: flutter build apk --debug
