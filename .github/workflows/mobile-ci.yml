name: Mobile CI

on:
  push:
    branches: [main]
    paths:
      - 'smart-env-mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'smart-env-mobile/**'
      - '.github/workflows/mobile-ci.yml'

defaults:
  run:
    working-directory: smart-env-mobile

jobs:
  build:
    runs-on: ubuntu-latest
    # Skips cleanly until pubspec.yaml exists, so the workflow doesn't fail
    # on the placeholder folder.
    if: hashFiles('smart-env-mobile/pubspec.yaml') != ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Run analyzer
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build APK (debug)
        run: flutter build apk --debug
