name: IoT CI

on:
  push:
    branches: [main]
    paths:
      - 'smart-env-iot/**'
      - '.github/workflows/iot-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'smart-env-iot/**'
      - '.github/workflows/iot-ci.yml'

defaults:
  run:
    working-directory: smart-env-iot

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if PlatformIO project exists yet
        id: check
        run: |
          if [ -f "platformio.ini" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No platformio.ini found yet - skipping build (placeholder component)."
          fi

      - name: Set up Python
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        if: steps.check.outputs.exists == 'true'
        run: pip install platformio

      - name: Build firmware
        if: steps.check.outputs.exists == 'true'
        run: pio run
