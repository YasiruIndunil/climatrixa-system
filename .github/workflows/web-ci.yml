name: Web CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'smart-env-web/**'
      - '.github/workflows/web-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'smart-env-web/**'
      - '.github/workflows/web-ci.yml'

defaults:
  run:
    working-directory: smart-env-web

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if Node project exists yet
        id: check
        run: |
          if [ -f "package.json" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No package.json found yet - skipping build (placeholder component)."
          fi

      - name: Set up Node.js
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: smart-env-web/package-lock.json

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        run: npm ci

      - name: Run lint
        if: steps.check.outputs.exists == 'true'
        run: npm run lint --if-present

      - name: Run tests
        if: steps.check.outputs.exists == 'true'
        run: npm test --if-present

      - name: Build
        if: steps.check.outputs.exists == 'true'
        run: npm run build
