name: Web CI

on:
  push:
    branches: [main]
    paths:
      - 'smart-env-web/**'
      - '.github/workflows/web-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'smart-env-web/**'
      - '.github/workflows/web-ci.yml'

defaults:
  run:
    working-directory: smart-env-web

jobs:
  build:
    runs-on: ubuntu-latest
    # Skips cleanly until package.json exists, so the workflow doesn't fail
    # on the placeholder folder.
    if: hashFiles('smart-env-web/package.json') != ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: smart-env-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Build
        run: npm run build
